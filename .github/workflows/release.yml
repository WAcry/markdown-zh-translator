name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example vX.Y.Z"
        required: true
      target_ref:
        description: "Git ref to build and release"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package:vsix

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RESOLVED_SHA="$(git rev-parse HEAD)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${{ inputs.release_tag }}"
          fi
          VSIX_PATH="markdown-zh-translator-${PACKAGE_VERSION}.vsix"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "vsix_path=${VSIX_PATH}" >> "${GITHUB_OUTPUT}"
          echo "resolved_sha=${RESOLVED_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Validate release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          EXPECTED_TAG="v${{ steps.metadata.outputs.package_version }}"
          ACTUAL_TAG="${{ steps.metadata.outputs.tag_name }}"
          if [[ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag ${ACTUAL_TAG} does not match package.json version ${EXPECTED_TAG#v}"
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/${ACTUAL_TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${ACTUAL_TAG}:refs/tags/${ACTUAL_TAG}"
          fi

          RESOLVED_TAG_SHA="$(git rev-parse -q --verify "refs/tags/${ACTUAL_TAG}^{commit}" 2>/dev/null || true)"
          if [[ -n "${RESOLVED_TAG_SHA}" && "${RESOLVED_TAG_SHA}" != "${{ steps.metadata.outputs.resolved_sha }}" ]]; then
            echo "Existing tag ${ACTUAL_TAG} points to ${RESOLVED_TAG_SHA}, not ${{ steps.metadata.outputs.resolved_sha }}"
            exit 1
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.metadata.outputs.tag_name }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.metadata.outputs.tag_name }}" "${{ steps.metadata.outputs.vsix_path }}" --clobber
          else
            gh release create "${{ steps.metadata.outputs.tag_name }}" "${{ steps.metadata.outputs.vsix_path }}" \
              --title "${{ steps.metadata.outputs.tag_name }}" \
              --target "${{ steps.metadata.outputs.resolved_sha }}" \
              --generate-notes
          fi
